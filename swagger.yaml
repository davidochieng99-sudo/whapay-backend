openapi: 3.0.0
info:
  title: WhaPay API
  version: 1.0.0
  description: Payment API for Kenya and Africa
servers:
  - url: https://whapay-backend.onrender.com/api
paths:
  /pay-offline:
    post:
      summary: Create a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - merchantCode
                - customerPhone
                - amount
              properties:
                merchantCode:
                  type: string
                  example: DK0001
                customerPhone:
                  type: string
                  example: "254712345678"
                amount:
                  type: number
                  example: 500
                description:
                  type: string
                  example: "Product purchase"
      responses:
        '200':
          description: Payment successful
  /stats:
    get:
      summary: Get platform statistics
      responses:
        '200':
          description: Returns merchant count, transactions, volume
